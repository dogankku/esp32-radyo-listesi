name: Update ESP32 Radio List

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-radios:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Radyo listesini güncelle
        run: python update_radios.py

      - name: Değişiklik varsa GitHub'a kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add radyolar.txt
          git diff --cached --quiet || git commit -m "Otomatik radyo listesi güncellendi"
          git push
